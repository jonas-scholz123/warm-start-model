defaults:
  - base
  - data: era5_full
  - task: forecast
  - model: flow_matching_no_attention
  - _self_

model:
  backbone:
    in_channels: 254 # 2 context frames * 83 variables + 5 static + 83 random noise
    out_channels: 83 # 83 v-fields

execution:
  train_steps: 3000000
  gradient_clip_norm: 3.0
  ema_rate: 0.999

data:
  trainloader:
    batch_size: 4
  testloader:
    batch_size: 8

optimizer:
  lr: 1e-4
  betas: [0.9, 0.95]
